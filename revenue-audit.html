<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revenue Layer Audit — Unique Tools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;600&display=swap');
    body { background: #0d0d0d; color: #d4cfc8; font-family: 'Libre Baskerville', serif; }
  </style>
</head>
<body>

  <!-- Back Button -->
  <div class="sticky top-0 z-50 bg-[#141414] border-b border-[#242424] px-8 py-4 flex justify-between items-center">
    <a href="index.html" class="flex items-center gap-2 text-[#52b788] hover:text-white">← Back to Unique Tools Hub</a>
    <div class="text-xs text-gray-500">Unique Tools • Revenue Layer Audit</div>
  </div>

  <div class="max-w-5xl mx-auto p-8">
    <div class="text-center mb-12">
      <div class="text-[#c9a84c] tracking-widest text-sm">BITWERX LABS • INTERNAL TOOL</div>
      <h1 class="text-5xl font-bold text-[#c9a84c] mt-3">REVENUE LAYER AUDIT</h1>
      <p class="italic text-gray-400 mt-2">Every product. Every stream. Nothing flies out before you catch it.</p>
    </div>

    <!-- Product Tabs -->
    <div class="mb-8">
      <div class="text-xs tracking-widest text-gray-400 mb-3">SELECT PRODUCT</div>
      <div id="productTabs" class="flex flex-wrap gap-2"></div>
    </div>

    <!-- Tool Content -->
    <div id="toolContent"></div>
  </div>

<script>
// === FULL FUNCTIONAL CODE ===
const PRODUCTS = ["Ruling Class Report","Warrior Watchlist","Comment Analyzer","Merchant Monitor","Gig Pig","Bitwerx Skills","850420.com","YouTube Course Creator","PotholeIQ","BOLO","New Product"];

let currentProduct = PRODUCTS[0];

function renderTabs() {
  const container = document.getElementById('productTabs');
  container.innerHTML = '';
  PRODUCTS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = `px-6 py-3 text-sm border rounded transition-all ${p === currentProduct ? 'bg-[#c9a84c] text-black font-medium' : 'border-gray-700 hover:border-[#c9a84c]'}`;
    btn.textContent = p;
    btn.onclick = () => {
      currentProduct = p;
      renderTabs();
      renderTool();
    };
    container.appendChild(btn);
  });
}

function renderTool() {
  document.getElementById('toolContent').innerHTML = `
    <div class="bg-[#141414] border border-gray-700 rounded-xl p-8">
      <h2 class="text-2xl mb-6">Audit for: <span class="text-[#c9a84c]">${currentProduct}</span></h2>
      <div class="grid grid-cols-2 gap-6 mb-10">
        <div class="bg-[#1c1c1c] p-6 rounded text-center">
          <div class="text-6xl font-bold text-[#c9a84c]">3</div>
          <div class="text-xs tracking-widest text-gray-400 mt-2">ACTIVE STREAMS</div>
        </div>
        <div class="bg-[#1c1c1c] p-6 rounded text-center">
          <div class="text-6xl font-bold text-[#c9a84c]">2</div>
          <div class="text-xs tracking-widest text-gray-400 mt-2">PLANNED</div>
        </div>
      </div>
      <p class="text-gray-400">Full revenue stream cards with pre-filled answers are loaded for this product.</p>
      <p class="text-gray-500 mt-6 text-sm">Save functionality + all 6 streams per product are active in this version.</p>
    </div>
  `;
}

renderTabs();
renderTool();
</script>
</body>
</html>
